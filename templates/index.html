<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WasteVision — Smart Waste Classifier</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a38;
    --accent: #00ff88;
    --accent2: #00b8ff;
    --warn: #ff6b35;
    --text: #e8e8f0;
    --muted: #6b6b88;
    --radius: 12px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Noise grain overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* ── Header ── */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(12px);
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.4rem;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .logo span { color: var(--accent); }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border-radius: 100px;
    border: 1px solid var(--border);
    font-size: 0.72rem;
    color: var(--muted);
    background: var(--surface);
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }

  /* ── Main layout ── */
  main {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 24px;
    padding: 32px 40px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* ── Camera panel ── */
  .camera-panel {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .camera-label {
    font-family: 'Syne', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .camera-frame {
    position: relative;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--surface);
    aspect-ratio: 4/3;
  }

  .camera-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Corner brackets */
  .camera-frame::before,
  .camera-frame::after {
    content: '';
    position: absolute;
    width: 24px; height: 24px;
    border-color: var(--accent);
    border-style: solid;
    z-index: 5;
  }
  .camera-frame::before { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
  .camera-frame::after  { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }

  .camera-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(10,10,15,0.85);
    z-index: 4;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .camera-overlay.visible { opacity: 1; }

  .processing-ring {
    width: 60px; height: 60px;
    border-radius: 50%;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Result image overlay */
  #result-image-wrap {
    position: absolute;
    inset: 0;
    z-index: 3;
    display: none;
  }
  #result-image-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  #result-image-wrap.visible { display: block; }

  /* ── Capture button ── */
  .capture-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 16px 28px;
    border-radius: var(--radius);
    border: none;
    background: var(--accent);
    color: #000;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .capture-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.15);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s;
  }

  .capture-btn:hover::before { transform: scaleX(1); }
  .capture-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,255,136,0.3); }
  .capture-btn:active { transform: translateY(0); }
  .capture-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .capture-btn svg { flex-shrink: 0; }

  .live-btn {
    padding: 12px 20px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .live-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  .btn-row { display: flex; gap: 12px; }
  .btn-row .capture-btn { flex: 1; }

  /* ── Results panel ── */
  .results-panel {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .panel-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  .panel-card-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  /* ── Category result ── */
  .category-display {
    text-align: center;
    padding: 8px 0 4px;
  }

  .category-icon {
    font-size: 2.8rem;
    margin-bottom: 8px;
    display: block;
    filter: drop-shadow(0 0 12px rgba(0,255,136,0.3));
  }

  .category-name {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.02em;
    text-transform: capitalize;
  }

  .category-empty {
    color: var(--muted);
    font-size: 0.85rem;
    padding: 12px 0;
  }

  /* ── Confidence bar ── */
  .confidence-wrap {
    margin-top: 16px;
  }

  .confidence-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .confidence-val {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    color: var(--text);
  }

  .conf-track {
    height: 6px;
    background: var(--surface2);
    border-radius: 100px;
    overflow: hidden;
  }

  .conf-fill {
    height: 100%;
    border-radius: 100px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    width: 0%;
  }

  /* ── Detections list ── */
  .detection-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .detection-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: var(--surface2);
    border-radius: 8px;
    border: 1px solid var(--border);
    font-size: 0.78rem;
    transition: border-color 0.2s;
  }

  .detection-item:hover { border-color: var(--accent); }

  .det-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 500;
    color: var(--text);
    text-transform: capitalize;
  }

  .det-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    flex-shrink: 0;
  }

  .det-conf {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    color: var(--accent);
    font-size: 0.82rem;
  }

  .no-detections {
    color: var(--muted);
    font-size: 0.8rem;
    text-align: center;
    padding: 12px 0;
  }

  /* ── Strategy badge ── */
  .strategy-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 100px;
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: 0.68rem;
    color: var(--muted);
    margin-top: 10px;
  }

  /* ── Error toast ── */
  #error-toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #2a0a0a;
    border: 1px solid var(--warn);
    color: var(--warn);
    padding: 12px 24px;
    border-radius: var(--radius);
    font-size: 0.8rem;
    z-index: 100;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }

  #error-toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; padding: 20px; }
    header { padding: 16px 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Waste<span>Vision</span></div>
  <div class="status-pill">
    <div class="status-dot"></div>
    CAMERA LIVE
  </div>
</header>

<main>
  <!-- Camera Panel -->
  <div class="camera-panel">
    <div class="camera-label">Live Feed</div>

    <div class="camera-frame" id="camera-frame">
      <!-- Live stream -->
      <img id="live-feed" src="" alt="Live camera feed" style="width:100%;height:100%;object-fit:cover;display:block;"/>

      <!-- Processing overlay -->
      <div class="camera-overlay" id="processing-overlay">
        <div class="processing-ring"></div>
      </div>

      <!-- Result image -->
      <div id="result-image-wrap">
        <img id="result-img" src="" alt="Annotated result"/>
      </div>
    </div>

    <div class="btn-row">
      <button class="capture-btn" id="capture-btn" onclick="captureFrame()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="3"/>
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        </svg>
        Capture &amp; Classify
      </button>
      <button class="live-btn" onclick="showLive()">↺ Live</button>
    </div>
  </div>

  <!-- Results Panel -->
  <div class="results-panel">

    <!-- Category -->
    <div class="panel-card">
      <div class="panel-card-title">Classification Result</div>
      <div class="category-display" id="category-display">
        <div class="category-empty">Capture an image to classify waste</div>
      </div>
    </div>

    <!-- Confidence -->
    <div class="panel-card">
      <div class="panel-card-title">Confidence Score</div>
      <div class="confidence-wrap">
        <div class="confidence-header">
          <span>Model certainty</span>
          <span class="confidence-val" id="conf-val">—</span>
        </div>
        <div class="conf-track">
          <div class="conf-fill" id="conf-fill"></div>
        </div>
      </div>
    </div>

    <!-- Detections -->
    <div class="panel-card">
      <div class="panel-card-title">Detected Objects</div>
      <div class="detection-list" id="detection-list">
        <div class="no-detections">No objects detected yet</div>
      </div>
    </div>

  </div>
</main>

<div id="error-toast"></div>

<script>
    const CATEGORY_ICONS = {
        battery: '🔋', biological: '🌿', cardboard: '📦',
        clothes: '👕', glass: '🍾', metal: '🔩',
        paper: '📄', plastic: '♻️', shoes: '👟', trash: '🗑️',
    };

    async function captureFrame() {
        liveActive = false;
        const btn = document.getElementById('capture-btn');
        const overlay = document.getElementById('processing-overlay');
        const resultWrap = document.getElementById('result-image-wrap');
        const frame = document.getElementById('camera-frame');

        btn.disabled = true;
        overlay.classList.add('visible');
        resultWrap.classList.remove('visible');

        // Flash effect
        frame.style.transition = 'opacity 0.08s';
        frame.style.opacity = '0.1';
        setTimeout(() => {
            frame.style.transition = 'opacity 0.3s';
            frame.style.opacity = '1';
        }, 100);

        try {
            const res = await fetch('/capture', { method: 'POST' });
            const data = await res.json();

            if (data.error) { showError(data.error); return; }

            // Show annotated image
            document.getElementById('result-img').src = 'data:image/jpeg;base64,' + data.image;
            resultWrap.classList.add('visible');

            // Update UI
            updateCategory(data.category, data.confidence);
            updateConfidence(data.confidence);
            updateDetections(data.detections);

        } catch (e) {
            showError('Connection error: ' + e.message);
        } finally {
            overlay.classList.remove('visible');
            btn.disabled = false;
            liveActive = true;
            pollFrame();
        }
    }

    function showLive() {
        document.getElementById('result-image-wrap').classList.remove('visible');
        liveActive = true;
        pollFrame();
    }

    function updateCategory(category, confidence) {
        const el = document.getElementById('category-display');
        const icon = CATEGORY_ICONS[category.toLowerCase()] || '🗂️';
        const colorClass = confidence >= 80 ? 'var(--accent)' :
                        confidence >= 50 ? 'var(--accent2)' : 'var(--warn)';
        el.innerHTML = `
        <span class="category-icon">${icon}</span>
        <div class="category-name" style="color:${colorClass}">${category}</div>
        <div class="strategy-badge">
            <span>⚡</span> ensemble fusion
        </div>
        `;
    }

    function updateConfidence(pct) {
        document.getElementById('conf-val').textContent = pct + '%';
        setTimeout(() => {
        document.getElementById('conf-fill').style.width = pct + '%';
        }, 50);
    }

    function updateDetections(detections) {
        const el = document.getElementById('detection-list');
        if (!detections || detections.length === 0) {
        el.innerHTML = '<div class="no-detections">No objects detected</div>';
        return;
        }
        el.innerHTML = detections.map(d => `
        <div class="detection-item">
            <div class="det-label">
            <div class="det-dot"></div>
            ${d.label}
            </div>
            <div class="det-conf">${d.confidence}%</div>
        </div>
        `).join('');
    }

    function showError(msg) {
        const toast = document.getElementById('error-toast');
        toast.textContent = '⚠ ' + msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 4000);
    }

    // Keyboard shortcut: Space to capture
    document.addEventListener('keydown', e => {
        if (e.code === 'Space' && !document.getElementById('capture-btn').disabled) {
        e.preventDefault();
        captureFrame();
        }
    });

  // Live feed polling
    let liveActive = true;
    function pollFrame() {
        if (!liveActive) return;
        const img = document.getElementById('live-feed');
        img.src = '/frame?' + Date.now();  // cache bust
        img.onload = () => setTimeout(pollFrame, 50);  // ~20fps
        img.onerror = () => setTimeout(pollFrame, 500);
    }
    pollFrame();  // start on page load
</script>
</body>
</html>
